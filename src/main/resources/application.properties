spring.application.name=server
spring.config.import=optional:dotenv:file:.env
server.port=${SERVER_PORT:8080}

# Database Connection
# Note: We use localhost because the server runs on your machine, not inside Docker
spring.datasource.url=jdbc:postgresql://localhost:${DB_PORT:5432}/${DB_NAME:gitea}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# File Upload Configuration
file.upload-dir=uploads
file.max-size=5242880

# Servlet Multipart Configuration
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# JWT Configuration
jwt.secret=${JWT_SECRET:your_super_secret_jwt_key_change_this_in_production_make_it_long_and_secure_32_chars_minimum}
jwt.expiration.ms=${JWT_EXPIRATION_MS:86400000}